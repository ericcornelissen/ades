name: Renovate
on:
  pull_request:
    branches:
    - renovate/**
  push:
    branches:
    - renovate/**

permissions: read-all

jobs:
  ghasum:
    name: Update gha.sum
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.actor == 'renovate[bot]'
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 2 # required for --amend
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
    - name: Create automation token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: automation-token
      with:
        client-id: ${{ secrets.AUTOMATION_APP_ID }}
        permission-contents: write # To push a commit
        permission-workflows: write # To push gha.sum
        private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
    - name: Update gha.sum
      run: go run github.com/chains-project/ghasum/cmd/ghasum update
    - name: Commit gha.sum
      env:
        BRANCH: ${{ github.ref_name }}
        GH_TOKEN: ${{ steps.automation-token.outputs.token }}
        REPOSITORY: ${{ github.repository }}
      run: |
        if [ -z "$(git status --porcelain)" ]; then
          echo 'Already up-to-date'
          exit 0
        fi

        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

        git add '.github/workflows/gha.sum'
        git commit --amend --no-edit --trailer 'Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>'

        git remote set-url 'origin' "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}"
        git push --force 'origin' "HEAD:${BRANCH}"
