name: CodeQL
on:
  pull_request: ~
  push:
    branches:
    - main

permissions: read-all

jobs:
  codeql:
    name: ${{ matrix.what }}
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # To upload CodeQL results
    strategy:
      fail-fast: false
      matrix:
        what:
          - actions
          - go
    steps:
    - name: Checkout repository
      uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version-file: go.mod
    - name: Verify action checksums
      env:
        JOB: ${{ github.job }}
        WORKFLOW: ${{ github.workflow_ref }}
      run: |
        WORKFLOW=$(echo "${WORKFLOW}" | cut -d '@' -f 1 | cut -d '/' -f 3-5)
        go run github.com/chains-project/ghasum/cmd/ghasum verify \
          -cache /home/runner/work/_actions -no-evict -offline "${WORKFLOW}:${JOB}"
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3.29.0
      with:
        config-file: ./.github/codeql.yml
        languages: ${{ matrix.what }}
    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v3.29.0
